name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      # Strict install: CI fails the build if yarn.lock and package.json drift.
      # Netlify (prod build) deliberately runs plain `yarn install` so a
      # lockfile out-of-sync doesn't block a deploy — CI's job is to catch
      # that drift before merge.
      - run: yarn install --frozen-lockfile

      - run: yarn lint

      - run: yarn test

      - run: yarn build
